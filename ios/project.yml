name: App
options:
  bundleIdPrefix: com.rebelwallet.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.rebelwallet.app
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: 6JWFWV65BL
  configs:
    Debug:
      PRODUCT_BUNDLE_IDENTIFIER: com.rebelwallet.app
    Release:
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      CODE_SIGNING_ALLOWED: NO

targets:
  App:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: Frameworks/RebelWalletCore.xcframework
        embed: false

schemes:
  App:
    build:
      targets:
        App: all
